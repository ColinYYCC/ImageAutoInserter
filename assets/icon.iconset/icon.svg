<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2"/>
      <stop offset="100%" style="stop-color:#357ABD"/>
    </linearGradient>
    <linearGradient id="imgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6"/>
      <stop offset="100%" style="stop-color:#8E44AD"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rectangle -->
  <rect x="32" y="32" width="448" height="448" rx="80" ry="80" fill="url(#bgGradient)"/>

  <!-- Excel Grid Pattern -->
  <g fill="rgba(255,255,255,0.15)">
    <!-- Horizontal lines -->
    <rect x="80" y="140" width="200" height="12" rx="6"/>
    <rect x="80" y="190" width="200" height="12" rx="6"/>
    <rect x="80" y="240" width="200" height="12" rx="6"/>
    <rect x="80" y="290" width="160" height="12" rx="6"/>
    <!-- Vertical lines -->
    <rect x="130" y="100" width="12" height="220" rx="6"/>
    <rect x="200" y="100" width="12" height="220" rx="6"/>
  </g>

  <!-- Image Icon -->
  <g transform="translate(240, 200)">
    <!-- Image frame -->
    <rect x="0" y="0" width="180" height="140" rx="16" ry="16" fill="url(#imgGradient)" stroke="white" stroke-width="8"/>
    <!-- Mountain/landscape -->
    <polygon points="20,120 60,60 100,100 140,40 160,120" fill="rgba(255,255,255,0.3)"/>
    <!-- Sun -->
    <circle cx="140" cy="35" r="15" fill="rgba(255,255,255,0.6)"/>
  </g>

  <!-- Arrow indicating insertion -->
  <g transform="translate(200, 280)">
    <path d="M 0 20 L 60 20 L 50 10 M 60 20 L 50 30" stroke="white" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>