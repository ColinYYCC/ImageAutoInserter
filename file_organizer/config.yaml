version: "1.0"

# 监听路径
watch_paths:
  - "."

# 排除目录（永远不移动）
exclude_dirs:
  - "src/"
  - ".trae/"
  - "node_modules/"
  - ".git/"
  - "public/"
  - "docs/"
  - ".venv/"
  - "dist/"
  - "build/"
  - ".organized/"

# 延迟时间（秒）
delay_seconds: 3

# 分类规则（相对于源文件所在目录）
rules:
  - name: "测试输出"
    patterns:
      - "TEST_OUTPUT_*.xlsx"
      - "*_test*.xlsx"
    target_dir: "data/test-results/"

  - name: "错误报告"
    patterns:
      - "错误报告_*.txt"
      - "error_*.log"
    target_dir: "logs/errors/"

  - name: "处理后Excel"
    patterns:
      - "*_processed.xlsx"
    target_dir: "data/processed/"

  - name: "测试报告"
    patterns:
      - "TEST_REPORT*.md"
      - "*_test_report.md"
    target_dir: "reports/"

  - name: "原型HTML"
    patterns:
      - "*.html"
    source_dir: "prototypes/"
    target_dir: "experiments/prototypes/"

  - name: "压缩包"
    patterns:
      - "*.zip"
      - "*.rar"
      - "*.7z"
    target_dir: "data/archives/"

  - name: "图片数据"
    patterns:
      - "C*.jpg"
      - "C*.png"
      - "*.jpg"
      - "*.png"
    target_dir: "data/images/"

  - name: "临时文件"
    patterns:
      - "temp_*"
      - "*.tmp"
      - "~*"
    target_dir: "artifacts/temp/"

# 默认分类
default_dir: "misc/"
